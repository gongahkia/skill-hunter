<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Hunter</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <div class="popup-header">
        <h1 class="popup-title">Skill Hunter</h1>
        <p class="popup-description">
          Research-ready reading mode for Singapore legislation with in-page search, citation copy,
          and private notes.
        </p>
      </div>

      <p id="statusMessage" class="popup-status" role="status" aria-live="polite"></p>

      <div class="popup-actions">
        <button id="toggleButton" class="btn btn-primary">Open simplified research view</button>
      </div>

      <div class="popup-footer">
        <strong>Tip:</strong> in the simplified view, press <kbd>Ctrl</kbd>/<kbd>Cmd</kbd> +
        <kbd>F</kbd> to search and <kbd>Esc</kbd> to close.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
