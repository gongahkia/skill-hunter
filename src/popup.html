<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Hunter</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <header class="popup-header">
        <span class="popup-header-label">Statute properties</span>
        <span class="popup-header-actions" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="3" cy="8" r="1" /><circle cx="8" cy="8" r="1" /><circle cx="13" cy="8" r="1" />
          </svg>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 13l4-4 3 3 5-6" /><path d="M9 6h4v4" />
          </svg>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="2" />
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" />
          </svg>
        </span>
      </header>

      <div class="popup-title-block">
        <h1 id="statuteTitle" class="popup-title popup-title-empty">No SSO page detected</h1>
      </div>

      <p class="popup-properties-heading">Properties</p>
      <dl class="popup-properties" id="statuteProperties">
        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="3" width="11" height="10" rx="1.5"/><path d="M5 6h6M5 8.5h6M5 11h3"/></svg>
          <span>type</span>
        </dt>
        <dd class="popup-property-value" id="propType">—</dd>

        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l2.5 1.5"/></svg>
          <span>status</span>
        </dt>
        <dd class="popup-property-value" id="propStatus">—</dd>

        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="3.5" width="11" height="10" rx="1.5"/><path d="M2.5 6.5h11M5.5 2v3M10.5 2v3"/></svg>
          <span>date</span>
        </dt>
        <dd class="popup-property-value" id="propDate">—</dd>

        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 13V3l4 2 4-2v10"/><path d="M4 13l4-2 4 2"/></svg>
          <span>revised</span>
        </dt>
        <dd class="popup-property-value" id="propRevised">—</dd>

        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2H4.5C3.7 2 3 2.7 3 3.5v9c0 .8.7 1.5 1.5 1.5h7c.8 0 1.5-.7 1.5-1.5V6L9 2z"/><path d="M9 2v4h4"/></svg>
          <span>PDF</span>
        </dt>
        <dd class="popup-property-value" id="propPdf">—</dd>

        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3"/><circle cx="11" cy="11" r="2.5"/><path d="M8.5 8.5L9 9"/></svg>
          <span>citations</span>
        </dt>
        <dd class="popup-property-value" id="propCitations">—</dd>

        <dt class="popup-property-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 9.5l-2 2a2.5 2.5 0 11-3.5-3.5l2-2"/><path d="M9 6.5l2-2a2.5 2.5 0 113.5 3.5l-2 2"/><path d="M5.5 10.5l5-5"/></svg>
          <span>source</span>
        </dt>
        <dd class="popup-property-value" id="propSource">—</dd>
      </dl>

      <p id="statusMessage" class="popup-status" role="status" aria-live="polite"></p>

      <div class="popup-actions">
        <button id="toggleButton" class="btn btn-primary" disabled>Open simplified research view</button>
      </div>

      <div class="popup-footer">
        <strong>Tip:</strong> in the simplified view, press <kbd>Ctrl</kbd>/<kbd>Cmd</kbd> +
        <kbd>F</kbd> to search and <kbd>Esc</kbd> to close.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
