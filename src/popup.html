<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Hunter</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <div class="popup-header">
        <h1 class="popup-title">Skill Hunter</h1>
        <p class="popup-description">
          Reformat supported Singapore legislation pages into a cleaner reading view.
        </p>
      </div>

      <p id="statusMessage" class="popup-status" role="status" aria-live="polite"></p>

      <div class="popup-actions">
        <button id="toggleButton" class="btn btn-primary">Toggle simplified view</button>
      </div>

      <div class="popup-footer">
        Works on SSO pages opened in Whole Document mode. See
        <a
          href="https://github.com/gongahkia/skill-hunter"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
