name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build extension
        run: npm run build

      - name: Package Firefox source archive
        run: make firefox-source-package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-hunter-build
          path: |
            dist
            submission/firefox/artifacts
